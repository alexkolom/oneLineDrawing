<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SingleLine — Image Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0d;
      --card:     #111116;
      --head:     #15151b;
      --border:   #22222a;
      --accent:   #7c5af6;
      --accent2:  rgba(124, 90, 246, 0.12);
      --text:     #dddde6;
      --muted:    #5a5a6a;
      --green:    #4ade80;
      --red:      #f87171;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 20px 120px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }

    .logo { font-family: var(--mono); }
    .logo-main {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--text);
    }
    .logo-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .btn-load {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-load:hover { opacity: 0.82; }
    .btn-load input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }

    .status-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .status-badge.active { color: var(--accent); border-color: var(--accent); }

    /* ── Drop zone ── */
    #dropzone {
      border: 1.5px dashed var(--border);
      border-radius: 14px;
      padding: 80px 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropzone:hover, #dropzone.dragover {
      border-color: var(--accent);
      background: var(--accent2);
    }
    .dz-icon { font-size: 32px; color: var(--muted); margin-bottom: 14px; line-height: 1; }
    .dz-text { font-size: 15px; margin-bottom: 7px; }
    .dz-hint { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── Pipeline ── */
    #pipeline { display: flex; flex-direction: column; }

    /* ── Connector ── */
    .conn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0;
      gap: 0;
    }
    .conn-line {
      width: 1px;
      height: 26px;
      background: linear-gradient(to bottom, var(--border), rgba(124,90,246,0.45));
    }
    .conn-arrow {
      font-size: 10px;
      color: var(--accent);
      opacity: 0.45;
      line-height: 1;
    }

    /* ── Step card ── */
    .step-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .step-card.running {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(124,90,246,0.15);
    }
    .step-card.done { border-color: var(--border); }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      background: var(--head);
      border-bottom: 1px solid var(--border);
    }
    .step-label { display: flex; align-items: baseline; gap: 10px; }
    .step-num {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      opacity: 0.75;
      letter-spacing: 0.12em;
    }
    .step-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text);
    }
    .step-desc {
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
    }
    .step-meta { display: flex; align-items: center; gap: 14px; }
    .step-time, .step-stat {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }
    .step-time.fast { color: var(--green); }
    .step-time.slow { color: var(--red); }

    /* ── Step body (canvas/SVG area) ── */
    .step-body {
      background: #000;
      height: 380px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .step-body canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }
    .step-body.white-bg { background: #fff; }
    .step-body .placeholder {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 32px;
    }

    /* SVG preview */
    .svg-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; overflow: hidden; }
    .svg-wrap svg { display: block; max-width: 100%; max-height: 100%; width: auto; height: auto; }

    /* Spinner overlay */
    .spin-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
    }
    .spin-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 0.9s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

    /* ── Controls ── */
    .step-controls {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--head);
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 22px;
    }

    .ctrl { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .ctrl-slider { width: 130px; accent-color: var(--accent); cursor: pointer; }
    .ctrl-val {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      min-width: 28px;
    }

    .btn-reset {
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-reset:hover { color: var(--text); border-color: var(--muted); }

    .btn-auto {
      padding: 7px 14px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-auto:hover { background: var(--accent2); }

    .btn-export {
      margin-left: auto;
      padding: 7px 14px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-export:hover { background: var(--accent2); }
    .btn-export:disabled { opacity: 0.35; cursor: default; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-main">SINGLELINE</div>
      <div class="logo-sub">image → single continuous curve</div>
    </div>
    <div class="header-right">
      <div class="status-badge" id="statusBadge">no image</div>
      <button class="btn-auto" id="btnAutoAll">Auto All</button>
      <button class="btn-reset" id="btnMode">Mode: Pipeline</button>
      <button class="btn-reset" id="btnMultiPath">Multi-path: OFF</button>
      <button class="btn-reset" id="btnReset">Reset Settings</button>
      <label class="btn-load">
        Load Image
        <input type="file" id="fileInput" accept="image/*">
      </label>
    </div>
  </header>

  <div id="dropzone">
    <div class="dz-icon">⊕</div>
    <div class="dz-text">Drop an image here, or click <strong>Load Image</strong></div>
    <div class="dz-hint">PNG · JPG · GIF · processed at ≤ 600 px</div>
  </div>

  <div id="pipeline" style="display:none"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
